name: 'Fact-Check Reports'
description: 'Automatically fact-check markdown reports in PRs — extract claims, check links, flag unsupported figures'
branding:
  icon: 'check-circle'
  color: 'green'
inputs:
  report-pattern:
    description: 'Glob pattern for report files to check'
    required: false
    default: '**/*.md'
  check-links:
    description: 'Whether to check live link resolution'
    required: false
    default: 'true'
  link-timeout:
    description: 'Per-request timeout for link checking (seconds)'
    required: false
    default: '10'
  python-version:
    description: 'Python version for running scripts'
    required: false
    default: '3.11'
outputs:
  claims-count:
    description: 'Total number of claims found'
  broken-links:
    description: 'Number of broken links found'
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install efc
      shell: bash
      run: pip install ${{ github.action_path }}

    - name: Extract claims from reports
      id: extract
      shell: bash
      run: |
        echo "## 🔍 Fact-Check Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        total_claims=0

        for file in $(find . -name '*.md' -not -path './.git/*' -not -name 'FACTCHECK.md' -not -name 'CHANGELOG.md' -not -name 'README.md' -not -name 'SECURITY.md' -not -name 'CONTRIBUTING.md' | sort); do
          claims=$(efc extract --json "$file" 2>/dev/null)
          if [ -n "$claims" ]; then
            count=$(echo "$claims" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
            total_claims=$((total_claims + count))
            echo "### \`$file\` — $count claims" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            efc extract "$file" >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
        done

        echo "claims-count=$total_claims" >> $GITHUB_OUTPUT
        echo "**Total claims found: $total_claims**" >> $GITHUB_STEP_SUMMARY

    - name: Check links in reports
      id: links
      if: inputs.check-links == 'true'
      shell: bash
      run: |
        total_broken=0

        for file in $(find . -name '*.md' -not -path './.git/*' -not -name 'FACTCHECK.md' -not -name 'CHANGELOG.md' -not -name 'README.md' | sort); do
          output=$(efc links --timeout ${{ inputs.link-timeout }} "$file" 2>/dev/null || true)
          # Count lines that are actual broken link results (not the summary line)
          broken_count=$(echo "$output" | grep -cE '^\[(not_found|server_error|ssl_error|unreachable|client_error)' || echo 0)

          if [ "$broken_count" -gt 0 ]; then
            total_broken=$((total_broken + broken_count))
            echo "### 🔗 Broken links in \`$file\`" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
        done

        echo "broken-links=$total_broken" >> $GITHUB_OUTPUT
        echo "**Broken links: $total_broken**" >> $GITHUB_STEP_SUMMARY

    - name: Check result
      shell: bash
      run: |
        if [ "${{ inputs.fail-on-broken-links }}" == "true" ]; then
          broken="${{ steps.links.outputs.broken-links || '0' }}"
          if [ "$broken" -gt 0 ]; then
            echo "::error::$broken broken link(s) found"
            exit 1
          fi
        fi
        echo "✅ Fact-check passed" >> $GITHUB_STEP_SUMMARY
