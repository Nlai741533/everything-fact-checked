name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6AM UTC

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate JSON manifests & schema
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json')); print('plugin.json OK')"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json')); print('marketplace.json OK')"
          python3 -c "import json; json.load(open('schemas/evidence.schema.json')); print('evidence.schema.json OK')"

      - name: Check SKILL.md frontmatter
        run: |
          test -f skills/fact-check/SKILL.md
          head -1 skills/fact-check/SKILL.md | grep -q '^---$' && echo "frontmatter OK"

      - name: Run unit tests
        run: PYTHONPATH=src:$PYTHONPATH python3 -m unittest discover -s tests -v

      - name: Smoke-test CLI (dev mode)
        run: |
          PYTHONPATH=src:$PYTHONPATH python3 -m efc.cli version
          PYTHONPATH=src:$PYTHONPATH python3 -m efc.cli extract examples/sample-report.md > /dev/null
          PYTHONPATH=src:$PYTHONPATH python3 -m efc.cli links --no-network examples/sample-report.md > /dev/null
          PYTHONPATH=src:$PYTHONPATH python3 -m efc.cli evidence examples/evidence-sample.json > /dev/null
          PYTHONPATH=src:$PYTHONPATH python3 -m efc.cli audit --no-network examples/sample-report.md > /dev/null

  install-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and install
        run: |
          pip install .
          efc version
          efc extract examples/sample-report.md > /dev/null
          efc evidence examples/evidence-sample.json
          efc audit --no-network examples/sample-report.md > /dev/null

  plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin and marketplace with the real CLI
        run: |
          claude plugin validate .
          claude plugin validate .claude-plugin/plugin.json
          claude plugin validate .claude-plugin/marketplace.json

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version alignment across all locations
        run: |
          PV=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          MV=$(python3 -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")
          TV=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          IV=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*[\"']([^\"']+)', open('src/efc/__init__.py').read()).group(1))")
          echo "plugin.json:      $PV"
          echo "marketplace.json: $MV"
          echo "pyproject.toml:   $TV"
          echo "__init__.py:      $IV"
          if [ "$PV" != "$MV" ] || [ "$PV" != "$TV" ] || [ "$PV" != "$IV" ]; then
            echo "ERROR: versions differ!"
            exit 1
          fi

          if [ -n "$GITHUB_REF_NAME" ] && echo "$GITHUB_REF" | grep -q refs/tags/; then
            TAG="${GITHUB_REF_NAME#v}"
            echo "Git tag (without v): $TAG"
            if [ "$TAG" != "$PV" ]; then
              echo "ERROR: git tag v$TAG does not match manifest version $PV!"
              exit 1
            fi
          fi
          echo "Version consistency check passed."

  # Scheduled live link check (not blocking on every PR)
  live-link-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check live links
        run: |
          pip install .
          efc links --timeout 10 examples/sample-report.md
